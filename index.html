<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アロマ・ハーブ診断</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:20px;
  background:#fafafa;
}
.container{
  max-width:500px;
  margin:auto;
}
h1{
  font-size:20px;
}
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
}
button{
  background:#333;
  color:#fff;
  border:none;
}
.result{
  margin-top:20px;
  padding:15px;
  background:#fff;
}
</style>
</head>

<body>

<div class="container">

<h1>アロマ・ハーブ診断</h1>

<input type="text" id="birth" placeholder="例：1990/01/01">
<input type="number" id="year" placeholder="対象年（例：2026）">

<button onclick="run()">診断する</button>

<div class="result" id="result"></div>

</div>

<script>
function sum(n){
  return n.toString().split('').reduce((a,b)=>a+Number(b),0);
}

function reduce(n){
  while(n>9){
    n=sum(n);
  }
  return n;
}

function run(){

  const birth=document.getElementById("birth").value;
  const year=document.getElementById("year").value;

  if(!birth){
    alert("生年月日を入力してください");
    return;
  }

  const parts=birth.split("/");
  const y=parts[0];
  const m=parts[1];
  const d=parts[2];

  const life=reduce(sum(y+m+d));
  const py=reduce(sum(m+d+year));

  document.getElementById("result").innerHTML=
  "ライフパス："+life+"<br>"+
  "今年："+py+"<br><br>"+
  "※軽量版表示";
}
</script>

</body>
</html>
